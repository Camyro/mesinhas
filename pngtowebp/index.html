<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Imagens Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: #fff;
            padding: 40px;
            max-width: 700px;
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        select, input[type="range"] {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            font-size: 14px;
            transition: all 0.3s;
            background: #f9f9f9;
        }

        select:focus {
            outline: none;
            border-color: #667eea;
            background: #fff;
        }

        select:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        .file-input-wrapper input[type=file] {
            position: absolute;
            left: -9999px;
        }

        .file-input-label {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: #f9f9f9;
            border: 3px dashed #d0d0d0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .file-input-label:hover {
            background: #f0f0ff;
            border-color: #667eea;
        }

        .file-input-label.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .file-input-label.disabled:hover {
            background: #f9f9f9;
            border-color: #d0d0d0;
        }

        .file-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .quality-control {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .quality-value {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            margin: 15px 0;
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            height: 8px;
            background: #e0e0e0;
            border-radius: 5px;
            outline: none;
            padding: 0;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            background: #667eea;
            cursor: pointer;
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.4);
        }

        input[type="range"]::-moz-range-thumb {
            width: 24px;
            height: 24px;
            background: #667eea;
            cursor: pointer;
            border-radius: 50%;
            border: none;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.4);
        }

        button {
            padding: 16px;
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #result {
            margin-top: 30px;
            padding: 20px;
            background: #f0f8ff;
            border-radius: 10px;
            text-align: center;
            display: none;
        }

        #result.show {
            display: block;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        #result a {
            display: inline-block;
            padding: 12px 30px;
            background: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3);
        }

        #result a:hover {
            background: #218838;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(40, 167, 69, 0.5);
        }

        .file-count {
            margin-top: 15px;
            padding: 10px;
            background: #e8f5e9;
            border-radius: 8px;
            color: #2e7d32;
            font-weight: 600;
            text-align: center;
            display: none;
        }

        .file-count.show {
            display: block;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 15px;
            display: none;
        }

        .progress-bar.show {
            display: block;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s;
        }

        .format-badge {
            display: inline-block;
            padding: 4px 12px;
            background: #667eea;
            color: white;
            border-radius: 20px;
            font-size: 12px;
            margin-left: 10px;
        }

        .info-text {
            color: #666;
            font-size: 13px;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🎨 Conversor de Imagens Pro</h2>
        <p class="subtitle">Converta suas imagens para qualquer formato com qualidade profissional</p>

        <div class="form-group">
            <label>📥 Formato de entrada:</label>
            <select id="inputType" required>
                <option value="" disabled selected>Selecione o formato de entrada</option>
                <option value="image/png">PNG - Transparência e alta qualidade</option>
                <option value="image/jpeg">JPG / JPEG - Fotos e imagens</option>
                <option value="image/webp">WEBP - Formato moderno</option>
                <option value="image/bmp">BMP - Bitmap sem compressão</option>
                <option value="image/gif">GIF - Imagens animadas</option>
            </select>
        </div>

        <div class="form-group">
            <label>📤 Formato de saída:</label>
            <select id="outputType" required>
                <option value="" disabled selected>Selecione o formato de saída</option>
                <option value="image/png">PNG - Melhor para transparência</option>
                <option value="image/jpeg">JPG / JPEG - Menor tamanho</option>
                <option value="image/webp">WEBP - Equilíbrio qualidade/tamanho</option>
                <option value="image/bmp">BMP - Sem compressão</option>
            </select>
            <p class="info-text" id="formatInfo"></p>
        </div>

        <div class="quality-control" id="qualityControl" style="display: none;">
            <label>🎯 Qualidade da conversão:</label>
            <div class="quality-value" id="qualityValue">70%</div>
            <input type="range" id="qualitySlider" min="1" max="100" value="70">
            <p class="info-text">Ajuste a qualidade para equilibrar tamanho e fidelidade da imagem</p>
        </div>

        <div class="form-group">
            <label>🖼️ Selecione suas imagens:</label>
            <div class="file-input-wrapper">
                <input type="file" id="fileInput" multiple accept="image/*">
                <label for="fileInput" class="file-input-label disabled" id="fileLabel">
                    <div>
                        <div class="file-icon">📁</div>
                        <div><strong>Clique para selecionar</strong> ou arraste as imagens aqui</div>
                    </div>
                </label>
            </div>
            <div class="file-count" id="fileCount"></div>
        </div>

        <button id="convertBtn" disabled>🚀 Converter Imagens</button>

        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div id="result"></div>
    </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
const inputType = document.getElementById('inputType');
const outputType = document.getElementById('outputType');
const fileInput = document.getElementById('fileInput');
const fileLabel = document.getElementById('fileLabel');
const convertBtn = document.getElementById('convertBtn');
const resultBox = document.getElementById('result');
const fileCount = document.getElementById('fileCount');
const qualityControl = document.getElementById('qualityControl');
const qualitySlider = document.getElementById('qualitySlider');
const qualityValue = document.getElementById('qualityValue');
const formatInfo = document.getElementById('formatInfo');
const progressBar = document.getElementById('progressBar');
const progressFill = document.getElementById('progressFill');

const formatInfoText = {
    'image/png': 'PNG preserva transparência e oferece compressão sem perdas. Ideal para logos e gráficos.',
    'image/jpeg': 'JPEG oferece ótima compressão com pequena perda de qualidade. Perfeito para fotos.',
    'image/webp': 'WebP é um formato moderno que combina tamanho pequeno e boa qualidade.',
    'image/bmp': 'BMP é um formato sem compressão, resultando em arquivos grandes mas sem perda.'
};

function checkReady() {
    if (inputType.value && outputType.value) {
        fileInput.disabled = false;
        fileLabel.classList.remove('disabled');

        // Mostrar controle de qualidade apenas para JPEG e WebP
        if (outputType.value === 'image/jpeg' || outputType.value === 'image/webp') {
            qualityControl.style.display = 'block';
        } else {
            qualityControl.style.display = 'none';
        }
    }
}

inputType.addEventListener('change', () => {
    fileInput.accept = inputType.value;
    checkReady();
});

outputType.addEventListener('change', () => {
    formatInfo.textContent = formatInfoText[outputType.value] || '';
    checkReady();
});

qualitySlider.addEventListener('input', (e) => {
    qualityValue.textContent = e.target.value + '%';
});

fileInput.addEventListener('change', (e) => {
    const files = e.target.files;
    if (files.length > 0) {
        fileCount.textContent = `✓ ${files.length} ${files.length === 1 ? 'imagem selecionada' : 'imagens selecionadas'}`;
        fileCount.classList.add('show');
        convertBtn.disabled = false;
    } else {
        fileCount.classList.remove('show');
        convertBtn.disabled = true;
    }
});

// Drag and drop
fileLabel.addEventListener('dragover', (e) => {
    e.preventDefault();
    if (!fileLabel.classList.contains('disabled')) {
        fileLabel.style.background = '#f0f0ff';
        fileLabel.style.borderColor = '#667eea';
    }
});

fileLabel.addEventListener('dragleave', (e) => {
    e.preventDefault();
    fileLabel.style.background = '#f9f9f9';
    fileLabel.style.borderColor = '#d0d0d0';
});

fileLabel.addEventListener('drop', (e) => {
    e.preventDefault();
    fileLabel.style.background = '#f9f9f9';
    fileLabel.style.borderColor = '#d0d0d0';

    if (!fileLabel.classList.contains('disabled')) {
        fileInput.files = e.dataTransfer.files;
        fileInput.dispatchEvent(new Event('change'));
    }
});

convertBtn.addEventListener('click', async () => {
    const files = fileInput.files;
    if (!files.length) {
        alert("Selecione pelo menos uma imagem.");
        return;
    }

    convertBtn.disabled = true;
    resultBox.classList.remove('show');
    progressBar.classList.add('show');
    progressFill.style.width = '0%';

    const output = outputType.value;
    const quality = qualitySlider.value / 100;
    const zip = new JSZip();

    try {
        for (let i = 0; i < files.length; i++) {
            const file = files[i];

            // Atualizar progresso
            const progress = ((i + 1) / files.length) * 100;
            progressFill.style.width = progress + '%';

            const img = await createImageBitmap(file);
            const canvas = document.createElement('canvas');
            canvas.width = img.width;
            canvas.height = img.height;
            const ctx = canvas.getContext('2d');

            // Melhor qualidade de renderização
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
            ctx.drawImage(img, 0, 0);

            // Aplicar qualidade apenas para JPEG e WebP
            let blob;
            if (output === 'image/jpeg' || output === 'image/webp') {
                blob = await new Promise(resolve => canvas.toBlob(resolve, output, quality));
            } else {
                blob = await new Promise(resolve => canvas.toBlob(resolve, output));
            }

            const fileName = file.name.split('.').slice(0, -1).join('.') || 'imagem';
            zip.file(fileName + getExtension(output), blob);
        }

        const zipBlob = await zip.generateAsync({ type: "blob" });
        const url = URL.createObjectURL(zipBlob);

        resultBox.innerHTML = `
            <h3 style="color: #28a745; margin-bottom: 15px;">✅ Conversão concluída!</h3>
            <p style="margin-bottom: 15px; color: #666;">${files.length} ${files.length === 1 ? 'imagem convertida' : 'imagens convertidas'} com sucesso</p>
            <a href="${url}" download="imagens_convertidas.zip">⬇️ Baixar arquivo ZIP</a>
        `;
        resultBox.classList.add('show');

    } catch (error) {
        resultBox.innerHTML = `<p style="color: #dc3545;">❌ Erro na conversão: ${error.message}</p>`;
        resultBox.classList.add('show');
    } finally {
        convertBtn.disabled = false;
        progressBar.classList.remove('show');
    }
});

function getExtension(type) {
    return {
        "image/png": ".png",
        "image/jpeg": ".jpg",
        "image/webp": ".webp",
        "image/bmp": ".bmp"
    }[type] || '';
}
</script>
</body>
</html>
