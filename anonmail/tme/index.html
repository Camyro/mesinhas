<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <title>AnonMail — TME Architecture</title>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>
<p>TME Architecture</p>
<p id="status">Processando...</p>

<script>
  const ANON_LIMIT = 180;

  let db = null;
  function initFirebase() {
    try {
      if (!firebase.apps.length) {
        firebase.initializeApp({
          apiKey:            "AIzaSyC6mBZ-h8g3wQxjLuLRLSEKFaUfuaftm8k",
          authDomain:        "c1studios-mesinhas.firebaseapp.com",
          projectId:         "c1studios-mesinhas",
          storageBucket:     "c1studios-mesinhas.firebasestorage.app",
          messagingSenderId: "904298338390",
          appId:             "1:904298338390:web:9994ce8a818e3d943683f7"
        });
      }
      db = firebase.firestore();
    } catch(e) {
      console.warn('Firebase init error:', e);
    }
  }

  function monthKey() {
    const d = new Date();
    return String(d.getMonth() + 1).padStart(2,'0') + d.getFullYear();
  }

  function setResult(success, info = '') {
    const hashStr = success
      ? `result=success&mode=anon`
      : `result=error&msg=${encodeURIComponent(info)}`;
    window.location.hash = hashStr;

    if (window.parent !== window) {
      const msg = success
        ? { tme: true, success: true,  mode: 'anon' }
        : { tme: true, success: false, error: info };
      window.parent.postMessage(msg, '*');
    }

    const label = success ? `✓ Enviado (anon)` : `✗ Erro: ${info}`;
    document.getElementById('status').textContent = label;
    console.log('[AnonMail TME]', label);
  }

  async function getAnonCount() {
    if (!db) return 0;
    try {
      const snap = await db.collection('email').doc('anon_mes').get();
      return snap.exists ? (snap.data()[monthKey()] || 0) : 0;
    } catch(e) { return 0; }
  }

  async function incrementCounter() {
    if (!db) return;
    const mk  = monthKey();
    const inc = firebase.firestore.FieldValue.increment(1);
    try {
      await db.collection('email').doc('anon_geral').set({ total: inc }, { merge: true });
      await db.collection('email').doc('anon_mes').set({ [mk]: inc }, { merge: true });
    } catch(e) { console.warn('Firestore write error:', e); }
  }

  async function sendAnon(params) {
    const count = await getAnonCount();
    if (count >= ANON_LIMIT) {
      return setResult(false, `Limite mensal de ${ANON_LIMIT} e-mails anônimos atingido`);
    }
    try {
      emailjs.init("fftaponrhcrWIn5Tv");
      await emailjs.send("mesinhastools_autoemail", "template_hnobsrz", {
        to_email:   params.to,
        from_name:  'Anônimo',
        from_email: 'nao-responder@anonmail.io',
        subject:    params.subject,
        message:    params.message
      });
      await incrementCounter();
      setResult(true, 'anon');
    } catch(e) {
      setResult(false, e?.text || e?.message || 'Erro no EmailJS anônimo');
    }
  }

  async function main() {
    initFirebase();

    const p = new URLSearchParams(window.location.search);
    const params = {
      to:      p.get('to')      || '',
      subject: p.get('subject') || '',
      message: p.get('message') || '',
    };

    console.log('[AnonMail TME] Parâmetros:', params);

    if (!params.to)      return setResult(false, 'Parâmetro to é obrigatório');
    if (!params.subject) return setResult(false, 'Parâmetro subject é obrigatório');
    if (!params.message) return setResult(false, 'Parâmetro message é obrigatório');

    await sendAnon(params);
  }

  main();
</script>
</body>
</html>
